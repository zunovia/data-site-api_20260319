<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>政治・選挙 — 日本統計</title><link rel="stylesheet" href="../css/shared.css"></head><body>
<div class="page">

<script>document.write(headerHTML())</script>

<section class="page-hero"><div class="fade-in"><p class="section-eyebrow">Politics</p><h1 class="page-title">政治・選挙</h1><p class="page-desc">名前をクリックするとWikipediaから詳細と写真を取得します</p></div></section>

<div class="stat-grid fade-in">

</section>

<script>document.write(footerHTML())</script>
</div>
<script>
// Party chart with clickable leaders
createHBar(document.getElementById('c1'),[
  {name:'自民党',value:191,link:"showPersonModal('石破茂','自由民主党 総裁')"},

const govList=document.getElementById('gov-list');
govData.forEach(([pref,gov])=>{
  const el=document.createElement('div');
  el.className='gov-item';
  el.onclick=()=>showPersonModal(gov,`${pref} 知事`);
  el.innerHTML=`<div class="gov-thumb" id="gt-${pref}"></div><div class="gov-info"><span class="gov-pref">${pref}</span><span class="gov-name">${gov}</span></div>`;
  govList.appendChild(el);
});

initScrollReveal();checkAPI();
</script></body></html>
