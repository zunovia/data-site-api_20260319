<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>日本統計 JAPAN STATS</title>
<link rel="stylesheet" href="css/shared.css">
</head>
<body>
<script src="js/shared.js"></script>

<!-- Hero: number + stats + charts ALL in viewport -->
<div class="hero-wrap hero-compact" style="display:flex;flex-direction:column">
  <canvas id="hero-particles" class="hero-canvas"></canvas>
  <div class="hero-overlay"></div>

  <div style="position:absolute;top:0;left:0;right:0;z-index:3"><div class="page" style="min-height:auto"><script>document.write(headerHTML())</script></div></div>

  <div class="hero-content" style="flex:0;padding-top:72px">
    <p class="hero-eyebrow anim-fade" style="animation-delay:.3s">Japan Population 2024</p>
    <h1 class="hero-number anim-fade" style="animation-delay:.5s"><span id="counter">0</span><span class="hero-unit">千人</span></h1>
    <p class="hero-delta anim-fade" style="animation-delay:.7s">▼ 550,000 (−0.44%)</p>
    <div class="hero-stat-row anim-fade" style="animation-delay:.9s">
      <div class="hero-stat"><span class="hero-stat-label">高齢化率</span><span class="hero-stat-val">29.3<small>%</small></span></div>
      <div class="hero-stat"><span class="hero-stat-label">15歳未満</span><span class="hero-stat-val">11.2<small>%</small></span></div>
      <div class="hero-stat"><span class="hero-stat-label">CPI</span><span class="hero-stat-val" style="color:var(--amber)">108.5</span></div>
      <div class="hero-stat"><span class="hero-stat-label">失業率</span><span class="hero-stat-val" style="color:var(--blue)">2.5<small>%</small></span></div>
      <div class="hero-stat"><span class="hero-stat-label">外国人</span><span class="hero-stat-val">374<small>万人</small></span></div>
    </div>
  </div>

  <div class="hero-bottom anim-fade" style="animation-delay:1.1s">
    <div class="hero-chart-box" style="margin-bottom:8px"><div id="pyramid-chart"></div></div>
    <div class="hero-chart-row">
      <div class="hero-chart-box"><h4>総人口推移（千人）</h4><div id="pop-line-chart"></div></div>
      <div class="hero-chart-box"><h4>CPI推移（2020=100）</h4><div id="cpi-line-chart"></div></div>
    </div>
  </div>

  <div class="hero-scroll"><span>Explore</span></div>
</div>

<div class="page">
  <!-- Navigation -->
  <section class="nav-section">
    <div class="fade-in"><p class="section-eyebrow">Data Sections</p><h2 class="section-title">データを探す</h2></div>
    <div class="nav-list">
      <a href="pages/population.html" class="nav-item fade-in" style="--accent:var(--coral)"><div><span class="nav-sublabel">Population</span><span class="nav-label">人口</span></div><div class="nav-arrow">A</div></a>
      <a href="pages/income.html" class="nav-item fade-in" style="--accent:var(--blue)"><div><span class="nav-sublabel">Income</span><span class="nav-label">年収</span></div><div class="nav-arrow">A</div></a>
      <a href="pages/life.html" class="nav-item fade-in" style="--accent:var(--green)"><div><span class="nav-sublabel">Living</span><span class="nav-label">暮らし</span></div><div class="nav-arrow">A</div></a>
      <a href="pages/politics.html" class="nav-item fade-in" style="--accent:var(--purple)"><div><span class="nav-sublabel">Politics</span><span class="nav-label">政治・選挙</span></div><div class="nav-arrow">A</div></a>
      <a href="pages/medical.html" class="nav-item fade-in" style="--accent:var(--red)"><div><span class="nav-sublabel">Medical</span><span class="nav-label">医療・脳疾患</span></div><div class="nav-arrow">A</div></a>
      <a href="pages/npo.html" class="nav-item fade-in" style="--accent:var(--amber)"><div><span class="nav-sublabel">NPO & Donation</span><span class="nav-label">NPO・寄付</span></div><div class="nav-arrow">A</div></a>
      <a href="pages/explorer.html" class="nav-item fade-in" style="--accent:var(--fg3)"><div><span class="nav-sublabel">API Explorer</span><span class="nav-label">データ探索</span></div><div class="nav-arrow">A</div></a>
    </div>
  </section>
  <script>document.write(footerHTML())</script>
</div>

<script>
document.querySelectorAll('.nav-arrow').forEach(el=>{el.innerHTML=arrowSVG()});
const c=document.getElementById('counter');
animateCounter(c,123802);
initParticles('hero-particles');
createPopPyramid(document.getElementById('pyramid-chart'));
createLineChart(document.getElementById('pop-line-chart'),[126926,127768,128057,127095,126933,126706,126443,126167,126146,125502,125124,124352,123802],['00','02','04','06','08','10','12','14','16','18','20','22','24'],129000,'var(--coral)','千人');
createLineChart(document.getElementById('cpi-line-chart'),[99.3,99.8,100,99.8,102.3,105.8,108.5],['18','19','20','21','22','23','24'],112,'var(--amber)','指数');
</script>
</body>
</html>
