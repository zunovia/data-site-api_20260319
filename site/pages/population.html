<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>人口 — 日本統計</title><link rel="stylesheet" href="../css/shared.css"></head><body>

<script>document.write(footerHTML())</script>
</div>
